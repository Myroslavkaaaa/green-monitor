name: CI/CD Pipeline

# Тригери для запуску пайплайну
on:
  # Запуск при push у гілки main та develop
  push:
    branches:
      - main
      - develop
  # Запуск при створенні Pull Request
  pull_request:
    branches:
      - main
      - develop

jobs:
  # Job для збірки та тестування
  build-and-test:
    name: Build and Test
    runs-on: ubuntu-latest

    steps:
    # Крок 1: Отримання коду з репозиторію
      - name: Checkout repository
        uses: actions/checkout@v4

    # Крок 2: Налаштування Node.js
      - name: Use Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      # Крок 3: Встановити залежності (npm ci = clean install з lock-файлом)
      - name: Install dependencies
        run: npm install

      # Крок 4: ESLint перевірка стилю/синтаксису
      - name: Lint
        run: npm run lint

      # Крок 5: Збірка production
      - name: Build
        run: npm run build